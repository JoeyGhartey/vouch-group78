# ========================
# SERVER
# ========================
server.port=8081
spring.application.name=auth-service

# ========================
# DATABASE (dedicated auth database)
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/vouch_auth
spring.datasource.username=postgres
spring.datasource.password=bully
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT
# ========================
jwt.secret=vouch-super-secret-key-that-should-be-at-least-256-bits-long-for-security-purposes-change-this-in-production
jwt.expiration=2592000000
