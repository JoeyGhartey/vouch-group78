# ========================
# SERVER
# ========================
server.port=${PORT:8084}
spring.application.name=payment-service

# ========================
# DATABASE
# ========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/vouch_payments}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:bully}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET:vouch-super-secret-key-that-should-be-at-least-256-bits-long-for-security-purposes-change-this-in-production}

# ========================
# PAYSTACK
# ========================
paystack.secret.key=${PAYSTACK_SECRET_KEY:sk_test_f8314ab6417b564aff03567f2d8779117da281d7}
paystack.callback.url=${PAYSTACK_CALLBACK_URL:http://localhost:8084/api/payments/callback}

# ========================
# SERVICE URLS
# ========================
services.auth-service.url=${AUTH_SERVICE_URL:http://localhost:8081}
services.loan-service.url=${LOAN_SERVICE_URL:http://localhost:8083}
services.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8082}
