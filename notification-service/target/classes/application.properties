# ========================
# SERVER
# ========================
server.port=${PORT:8082}
spring.application.name=notification-service

# ========================
# DATABASE
# ========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/vouch_notifications}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:bully}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET:vouch-super-secret-key-that-should-be-at-least-256-bits-long-for-security-purposes-change-this-in-production}

# ========================
# SERVICE URLS
# ========================
services.auth-service.url=${AUTH_SERVICE_URL:http://localhost:8081}
